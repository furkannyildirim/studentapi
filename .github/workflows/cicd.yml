name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Java 21 kur
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. JAR dosyası oluştur
      - name: Build JAR
        run: mvn clean package -DskipTests

      # 4. Docker image oluştur
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/studentapi:latest .

      # 5. DockerHub'a login ol
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 6. Image'ı DockerHub'a push et
      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/studentapi:latest

      # 7. Script'i EC2'ya kopyala
      - name: Copy script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/"

      # 8. EC2'da docker-compose çalıştır
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            docker-compose down
            docker-compose pull
            docker-compose up -d